name: Portal Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'Portal/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'Portal/**'

permissions:
  contents: read

jobs:
  build:
    name: Build Portal
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: SwiftLint Portal
        run: |
          if command -v swiftlint >/dev/null; then
            swiftlint lint --config Portal/.swiftlint.yml
          elif command -v brew >/dev/null; then
            brew install swiftlint
            swiftlint lint --config Portal/.swiftlint.yml
          else
            echo "::warning::SwiftLint is not installed and Homebrew is unavailable; skipping Portal SwiftLint."
          fi

      - name: Build Portal
        run: |
          xcodebuild \
            -project Portal/LiveCaptionPortal.xcodeproj \
            -scheme LiveCaptionPortal \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
