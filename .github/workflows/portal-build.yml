name: Portal Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'Portal/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'Portal/**'

permissions:
  contents: read

jobs:
  build:
    name: Build Portal
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Portal
        run: |
          xcodebuild \
            -project Portal/LiveCaptionPortal.xcodeproj \
            -scheme LiveCaptionPortal \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
