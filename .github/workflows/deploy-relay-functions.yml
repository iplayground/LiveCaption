name: Relay Deploy

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-relay-functions.yml'
      - 'Relay/**'
  workflow_dispatch:
    inputs:
      rollback_ref:
        description: 'Commit SHA to redeploy if health check fails. Leave empty to skip automatic rollback.'
        required: false
        type: string

permissions:
  contents: read
  deployments: write
  id-token: write

env:
  PYTHON_VERSION: '3.13'

concurrency:
  group: livecaption-relay-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      id-token: write
    defaults:
      run:
        working-directory: Relay
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate Python sources
        run: python -m compileall function_app.py src

      - name: Validate application imports
        run: python -c "import function_app"

      - name: Find previous healthy deployment
        id: previous-deploy
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const environment = 'livecaption-relay-production';
            const deployments = await github.rest.repos.listDeployments({
              owner,
              repo,
              environment,
              per_page: 30,
            });

            for (const deployment of deployments.data) {
              if (deployment.sha === context.sha) {
                continue;
              }

              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner,
                repo,
                deployment_id: deployment.id,
                per_page: 1,
              });

              if (statuses.data[0]?.state === 'success') {
                core.setOutput('rollback_ref', deployment.sha);
                return;
              }
            }

            core.setOutput('rollback_ref', '');

      - name: Write build info
        shell: bash
        run: |
          set -euo pipefail
          printf '{"commit":"%s"}\n' "${GITHUB_SHA}" > build-info.json

      - name: Azure login with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy function code with remote build
        id: deploy-code
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: Relay
          remote-build: true

      - name: Verify deployed health
        id: health
        shell: bash
        run: |
          set -euo pipefail
          relay_health_url="https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health"

          for attempt in {1..18}; do
            if ! body="$(curl --fail --silent --show-error --max-time 10 "${relay_health_url}")"; then
              echo "Health check attempt ${attempt} could not reach Relay health endpoint."
              sleep 10
              continue
            fi

            if ! commit="$(python -c 'import json,sys; print(json.load(sys.stdin).get("commit", ""))' <<< "${body}")"; then
              echo "Health check attempt ${attempt} returned invalid JSON."
              sleep 10
              continue
            fi

            if [[ "${commit}" == "${GITHUB_SHA}" ]]; then
              echo "Health check passed for ${GITHUB_SHA}."
              exit 0
            fi

            echo "Health check attempt ${attempt} saw commit '${commit}', waiting for ${GITHUB_SHA}."
            sleep 10
          done

          echo "Health check did not observe deployed commit ${GITHUB_SHA}." >&2
          exit 1

      - name: Mark healthy deployment
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const environment = 'livecaption-relay-production';
            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: context.sha,
              environment,
              auto_merge: false,
              required_contexts: [],
            });

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment,
              description: 'Relay health check passed after Azure Function App upload.',
            });

      - name: Resolve rollback ref
        if: failure() && (steps.deploy-code.outcome == 'failure' || steps.health.outcome == 'failure')
        id: rollback-ref
        shell: bash
        run: |
          set -euo pipefail

          rollback_ref='${{ steps.previous-deploy.outputs.rollback_ref }}'
          if [[ -z "${rollback_ref}" && -n '${{ inputs.rollback_ref }}' ]]; then
            rollback_ref='${{ inputs.rollback_ref }}'
          elif [[ -z "${rollback_ref}" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            rollback_ref='${{ github.event.before }}'
          fi

          if [[ -z "${rollback_ref}" || "${rollback_ref}" =~ ^0+$ ]]; then
            echo "No rollback ref is available for this run."
            echo "rollback_ref=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Rollback ref: ${rollback_ref}"
          echo "rollback_ref=${rollback_ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout rollback ref
        if: failure() && (steps.deploy-code.outcome == 'failure' || steps.health.outcome == 'failure') && steps.rollback-ref.outputs.rollback_ref != ''
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ steps.rollback-ref.outputs.rollback_ref }}"
          git checkout --force "${{ steps.rollback-ref.outputs.rollback_ref }}"

      - name: Validate rollback application imports
        if: failure() && (steps.deploy-code.outcome == 'failure' || steps.health.outcome == 'failure') && steps.rollback-ref.outputs.rollback_ref != ''
        shell: bash
        run: python -c "import function_app"

      - name: Write rollback build info
        if: failure() && (steps.deploy-code.outcome == 'failure' || steps.health.outcome == 'failure') && steps.rollback-ref.outputs.rollback_ref != ''
        shell: bash
        run: |
          set -euo pipefail
          printf '{"commit":"%s"}\n' "${{ steps.rollback-ref.outputs.rollback_ref }}" > build-info.json

      - name: Roll back function code with remote build
        if: failure() && (steps.deploy-code.outcome == 'failure' || steps.health.outcome == 'failure') && steps.rollback-ref.outputs.rollback_ref != ''
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: Relay
          remote-build: true
